<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Clínica Villa Tunari{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Clínica Médica</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {{ is_active('/pacientes/') }}"
                            href="{{ url_for('paciente.index') }}">Pacientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ is_active('/medicos/') }}"
                            href="{{ url_for('medico.index') }}">Médicos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ is_active('/consultas/') }}"
                            href="{{ url_for('consulta.index') }}">Consultas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ is_active('/auth/usuarios') }}"
                            href="{{ url_for('usuario.index') }}">Usuarios</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="navbar-text text-white me-3 fw-semibold">
                        {{ session.get('usuario_nombre') }} (<small class="text-warning">{{
                            session.get('usuario_rol') }}</small>)
                    </span>
                    <a href="{{ url_for('usuario.logout') }}" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
                </div>
            </div>

        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
