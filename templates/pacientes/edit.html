{% extends 'base.html' %}

{% block title %}PACIENTES | EDITAR{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Editar Paciente: {{ paciente.nombre }}</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('paciente.edit', id=paciente.id) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" name="nombre" value="{{ paciente.nombre }}" required>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Edad</label>
                                <input type="number" class="form-control" name="edad" value="{{ paciente.edad }}" required>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label fw-bold">Teléfono</label>
                                <input type="text" class="form-control" name="telefono" value="{{ paciente.telefono }}" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Dirección</label>
                            <input type="text" class="form-control" name="direccion" value="{{ paciente.direccion }}" required>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('paciente.index') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Actualizar Datos</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
