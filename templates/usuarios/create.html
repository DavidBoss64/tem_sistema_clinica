{% extends 'base.html' %}

{% block title %}USUARIOS | REGISTRO{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Registrar Nuevo Usuario</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('usuario.create') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre Completo</label>
                            <input type="text" class="form-control" name="nombre" placeholder="ej. Juan Pérez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de Usuario (Login)</label>
                            <input type="text" class="form-control" name="username" placeholder="ej. jperez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Rol del Usuario</label>
                            <select class="form-select" name="rol" required>
                                <option value="" disabled selected>-- Seleccione un Rol --</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Médico">Médico</option>
                                <option value="Recepcionista">Recepcionista</option>
                            </select>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('usuario.index') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Usuario</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
